name: Gerar Conteudo Automatico

on:
  push:
    branches: [main]
  schedule:
    - cron: "30 9 */2 * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  gerar:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Gerar artigo
        run: node scripts/gerar-artigo.mjs
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}

      - name: Verificar alteracoes
        id: check
        run: |
          if [[ -n $(git status --porcelain) ]]; then
            echo "changed=true" >> $GITHUB_OUTPUT
          else
            echo "changed=false" >> $GITHUB_OUTPUT
          fi

      - name: Commit e push
        if: steps.check.outputs.changed == 'true'
        run: |
          git config user.name "blog-bot"
          git config user.email "bot@blog-gamer.com"
          git add -A
          git commit -m "feat: artigo gerado automaticamente"
          git push

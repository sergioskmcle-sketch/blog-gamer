name: Deploy Blog Gamer

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages-deploy
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Gerar status.json
        run: node -e "
          const fs = require('fs');
          const path = require('path');
          let state = {};
          try { state = JSON.parse(fs.readFileSync('state.json','utf-8')); } catch(e){}
          const artsDir = 'src/content/artigos';
          const count = fs.existsSync(artsDir) ? fs.readdirSync(artsDir).filter(f=>f.endsWith('.md')).length : 0;
          const status = {
            ultimo_artigo: state.last_success || 'nunca',
            ultimo_deploy: new Date().toISOString(),
            artigos_semana: count,
            total_artigos: count,
            erros_recentes: state.last_error ? [state.last_error_date + ': ' + state.last_error] : [],
            apis: { groq: 'ok', tavily: 'ok', rawg: 'ok' },
            saudavel: (state.consecutive_failures || 0) === 0
          };
          if (!fs.existsSync('public')) fs.mkdirSync('public', {recursive:true});
          fs.writeFileSync('public/status.json', JSON.stringify(status, null, 2));
        "

      - name: Build
        run: npm run build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

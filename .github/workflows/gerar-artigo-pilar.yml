name: Gerar Artigo Pilar

on:
  workflow_dispatch:

permissions:
  contents: write
  actions: write

concurrency:
  group: content-generation
  cancel-in-progress: false

jobs:
  gerar:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Gerar artigo pilar
        run: node scripts/gerar-artigo-pilar.mjs
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}

      - name: Verificar alteracoes
        id: check
        run: |
          if [[ -n $(git status --porcelain) ]]; then
            echo "changed=true" >> $GITHUB_OUTPUT
          else
            echo "changed=false" >> $GITHUB_OUTPUT
          fi

      - name: Commit e push
        if: steps.check.outputs.changed == 'true'
        run: |
          git config user.name "blog-bot"
          git config user.email "bot@blog-gamer.com"
          git add -A
          git commit -m "feat: artigo pilar — Guia Definitivo do Setup Gamer 2026"
          git push

      - name: Disparar deploy
        if: steps.check.outputs.changed == 'true'
        run: gh workflow run deploy.yml
        env:
          GH_TOKEN: ${{ github.token }}
